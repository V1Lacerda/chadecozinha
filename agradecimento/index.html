<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Obrigado! 🌸</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cormorant+Garamond:wght@400;600;700&family=Jost:wght@300;400&display=swap" rel="stylesheet">
    <link rel="icon" href="../catalogoicon.svg">
    <style>
    body {
        background-color: #fff5f8; /* O fundo rosa claro do seu tema */
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        font-family: 'Cormorant Garamond', serif;
        text-align: center;
    }
    h1 { font-family: 'Great Vibes', cursive; color: #b03a60; font-size: 3rem; }
    </style>
</head>
<!-- No <head> da sua agradecimento.html -->


<body>
  <h1>Muito obrigado! 🌸</h1>
  <p>Seu presente foi recebido com muito carinho.</p>

  <script>
    // Assim que a página carregar
    window.onload = () => {
      
      // 1. Configura o Toast
      const Toast = Swal.mixin({
        toast: true,
        position: 'top-end',
        showConfirmButton: false,
        timer: 5000, // 5 segundos
        timerProgressBar: true,
        didOpen: (toast) => {
          toast.addEventListener('mouseenter', Swal.stopTimer)
          toast.addEventListener('mouseleave', Swal.resumeTimer)
        }
      });

      // 2. Exibe a mensagem
      Toast.fire({
        icon: 'success',
        title: 'Sucesso!',
        html: 'Voltando ao catálogo em 5 segundos...'
      });

      // 3. Redireciona após o tempo do timer
      setTimeout(() => {
        window.location.href = 'https://v1lacerda.github.io/chadecozinha/'; // Altere para o link real se necessário
      }, 5000);
    };
  </script>
</body>
